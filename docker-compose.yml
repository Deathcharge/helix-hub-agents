version: '3.8'

services:
  app:
    build: .
    container_name: helix-orchestration
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://helix:helix_password@postgres:5432/helix_db
      - LOG_LEVEL=INFO
      - ENVIRONMENT=development
    depends_on:
      - redis
      - postgres
    networks:
      - helix-network
    restart: unless-stopped
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    command: python -m helix_agent_orchestration

  redis:
    image: redis:7-alpine
    container_name: helix-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - helix-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  postgres:
    image: postgres:15-alpine
    container_name: helix-postgres
    environment:
      - POSTGRES_USER=helix
      - POSTGRES_PASSWORD=helix_password
      - POSTGRES_DB=helix_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - helix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helix"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  postgres_data:

networks:
  helix-network:
    driver: bridge
