[pytest]
# Pytest configuration for helix-agent-orchestration

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories
testpaths = tests
pythonpath = src

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    --cov=src/helix_orchestration
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-branch
    -ra

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    asyncio: Async tests

# Asyncio configuration
asyncio_mode = auto

# Timeout for tests (in seconds)
timeout = 300

# Minimum Python version
minversion = 7.0

# Show local variables in tracebacks
showlocals = true

# Capture output
log_cli = false
log_cli_level = INFO
log_file = tests/pytest.log
log_file_level = DEBUG
